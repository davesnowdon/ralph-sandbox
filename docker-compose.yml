services:
  ralph:
    build:
      context: .
      dockerfile: dockerfiles/python/Dockerfile
      args:
        NODE_MAJOR: "20"
        # Pin if you want repeatability (recommended): set to a commit SHA
        # RALPH_REF: "a1b2c3d4..."
        RALPH_REF: "6c53cb0"
        RALPH_UID: "${UID:-1000}"
        RALPH_GID: "${GID:-1000}"

    image: ralph-sandbox:latest

    init: true
    working_dir: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}

    volumes:
      - type: bind
        source: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
        target: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}

    environment:
      - PROJECT_DIR=${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
      - RALPH_TOOL=${RALPH_TOOL:-claude}
      - SESSION_RUNNER=${SESSION_RUNNER:-}
      - RALPH_PROMPT_FILE=${RALPH_PROMPT_FILE:-}
      - CLAUDE_CONFIG_DIR=/claude_config
      - CODEX_HOME=/codex_config
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    restart: "no"

  ralph-login:
    image: ralph-sandbox:latest
    init: true
    entrypoint: ["/bin/bash"]
    working_dir: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
    volumes:
      - type: bind
        source: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
        target: ${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
    environment:
      - PROJECT_DIR=${PROJECT_DIR:?Set PROJECT_DIR to an absolute path}
      - RALPH_TOOL=${RALPH_TOOL:-claude}
      - SESSION_RUNNER=${SESSION_RUNNER:-}
      - RALPH_PROMPT_FILE=${RALPH_PROMPT_FILE:-}
      - CLAUDE_CONFIG_DIR=/claude_config
      - CODEX_HOME=/codex_config
